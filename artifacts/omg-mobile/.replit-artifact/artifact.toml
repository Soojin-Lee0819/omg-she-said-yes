kind = "mobile"
previewPath = "/omg-mobile/"
title = "OMG She Said YES — Mobile"
version = "1.0.0"
id = "artifacts/omg-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
name = "expo"
paths = [ "/omg-mobile/" ]
localPort = 19857

[services.development]
run = "pnpm --filter @workspace/omg-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/omg-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/omg-mobile", "run", "serve" ]

[services.env]
PORT = "19857"
BASE_PATH = "/omg-mobile/"
